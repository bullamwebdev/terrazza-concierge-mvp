<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Login | Terrazza di Sole</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    
    .auth-hero {
      background: linear-gradient(135deg, var(--blue-deep) 0%, #2E6BA8 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: var(--space-2xl);
      position: relative;
      overflow: hidden;
    }
    
    .auth-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('/images/hero-pattern.svg') repeat;
      opacity: 0.05;
    }
    
    .auth-hero-content {
      position: relative;
      text-align: center;
      color: var(--linen);
    }
    
    .auth-hero h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: var(--space-md);
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .auth-hero p {
      font-size: 1.125rem;
      opacity: 0.9;
      max-width: 400px;
    }
    
    .auth-form-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-2xl);
      background: var(--cream);
    }
    
    .auth-form-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }
    
    .auth-form-header h2 {
      font-size: 2rem;
      color: var(--blue-deep);
      margin-bottom: var(--space-xs);
    }
    
    .auth-form-header p {
      color: #7B8794;
    }
    
    .auth-form {
      max-width: 400px;
      margin: 0 auto;
      width: 100%;
    }
    
    .auth-form .form-group {
      margin-bottom: var(--space-md);
    }
    
    .auth-form label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--blue-deep);
      margin-bottom: var(--space-xs);
    }
    
    .auth-form input {
      width: 100%;
      padding: var(--space-md);
      border: 2px solid var(--linen-dark);
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color var(--duration-normal);
    }
    
    .auth-form input:focus {
      outline: none;
      border-color: var(--gold-lemon);
    }
    
    .auth-btn {
      width: 100%;
      padding: var(--space-md);
      background: var(--terracotta);
      color: var(--cream);
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      margin-top: var(--space-md);
      transition: all var(--duration-normal);
    }
    
    .auth-btn:hover {
      background: var(--terracotta-light);
      transform: translateY(-2px);
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin: var(--space-lg) 0;
      color: #7B8794;
      font-size: 0.875rem;
    }
    
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--linen-dark);
    }
    
    .social-login {
      display: flex;
      gap: var(--space-md);
    }
    
    .social-btn {
      flex: 1;
      padding: var(--space-md);
      border: 2px solid var(--linen-dark);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--blue-deep);
      transition: all var(--duration-normal);
    }
    
    .social-btn:hover {
      border-color: var(--gold-lemon);
      background: var(--linen);
    }
    
    .auth-footer {
      text-align: center;
      margin-top: var(--space-xl);
      color: #7B8794;
    }
    
    .auth-footer a {
      color: var(--terracotta);
      font-weight: 600;
    }
    
    .back-home {
      position: absolute;
      top: var(--space-lg);
      left: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      color: var(--linen);
      font-size: 0.9rem;
      opacity: 0.8;
      transition: opacity var(--duration-normal);
    }
    
    .back-home:hover {
      opacity: 1;
    }
    
    .error-message {
      background: #FEE2E2;
      border: 1px solid #FCA5A5;
      color: #DC2626;
      padding: var(--space-sm) var(--space-md);
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: var(--space-md);
      display: none;
    }
    
    @media (max-width: 768px) {
      .auth-page {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      
      .auth-hero {
        display: none;
      }
      
      .auth-form-container {
        padding: var(--space-lg) var(--space-md);
        justify-content: flex-start;
        padding-top: 80px;
        min-height: 100vh;
      }
      
      .auth-form-header {
        margin-bottom: var(--space-lg);
      }
      
      .auth-form-header h2 {
        font-size: 1.75rem;
      }
      
      .auth-form {
        padding: 0 var(--space-xs);
      }
      
      .auth-form .form-group {
        margin-bottom: var(--space-sm);
      }
      
      .auth-form input {
        padding: 14px;
        font-size: 16px; /* Prevent zoom on iOS */
        border-radius: 10px;
      }
      
      .auth-btn {
        padding: 14px;
        font-size: 1rem;
        margin-top: var(--space-sm);
      }
      
      .auth-divider {
        margin: var(--space-md) 0;
      }
      
      .social-login {
        flex-direction: column;
      }
      
      .auth-footer {
        margin-top: var(--space-lg);
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-hero">
      <a href="/" class="back-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Home
      </a>
      <div class="auth-hero-content">
        <h1>Terrazza di Sole</h1>
        <p>La dolce vita, elevated. Your luxury concierge experience awaits.</p>
      </div>
    </section>
    
    <section class="auth-form-container">
      <div class="auth-form-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>
      
      <div class="error-message" id="errorMessage"></div>
      
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
        </div>
        
        <button type="submit" class="auth-btn">Sign In</button>
      </form>
      
      <div class="auth-divider">or continue with</div>
      
      <div class="social-login">
        <button class="social-btn" onclick="showToast('Google login coming soon')">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </button>
      </div>
      
      <p class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </p>
    </section>
  </main>
  
  <div class="toast" id="toast">
    <span class="toast-message"></span>
  </div>
  
  <script>
    const API_BASE = '/api';
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const toast = document.getElementById('toast');
    
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('terrazza_token', data.token);
          
          const params = new URLSearchParams(window.location.search);
          const redirect = params.get('redirect') || '/';
          
          showToast('Login successful! Redirecting...');
          setTimeout(() => {
            window.location.href = redirect;
          }, 1000);
        } else {
          errorMessage.textContent = data.error || 'Login failed';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        errorMessage.textContent = 'Connection error. Please try again.';
        errorMessage.style.display = 'block';
      }
    });
    
    function showToast(message, duration = 3000) {
      toast.querySelector('.toast-message').textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }
  </script>
</body>
</html>
