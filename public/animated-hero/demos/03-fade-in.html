<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 3: Fade In Animations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; }

    .demo { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.3s forwards;
    }

    .title { font-size: clamp(2rem, 5vw, 4rem); font-weight: 600; line-height: 1.1; text-align: center; margin-bottom: 40px; }

    .animation-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }

    .anim-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      opacity: 0;
    }

    .anim-card span { font-size: 36px; display: block; margin-bottom: 12px; }

    .card-1 { animation: fadeIn 0.8s ease-out 0.5s forwards; }
    .card-2 { animation: slideUp 0.8s ease-out 0.7s forwards; }
    .card-3 { animation: scaleIn 0.6s ease-out 0.9s forwards; }
    .card-4 { animation: slideLeft 0.8s ease-out 1.1s forwards; }
    .card-5 { animation: slideRight 0.8s ease-out 1.3s forwards; }
    .card-6 { animation: slideDown 0.6s ease-out 1.5s forwards; }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.1s forwards;
    }
    .logo { font-size: 18px; font-weight: 600; }
    .logo span { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #fff; }
    .cta {
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .burger span { display: block; width: 20px; height: 2px; background: #fff; border-radius: 2px; transition: all 0.3s ease; }
    .burger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .burger.active span:nth-child(2) { opacity: 0; }
    .burger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .mobile-menu {
      position: fixed;
      top: 0;
      right: -100%;
      width: 280px;
      height: 100vh;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      padding: 100px 24px 24px;
      transition: right 0.3s ease;
      z-index: 99;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mobile-menu.open { right: 0; }
    .mobile-menu a { color: #fff; text-decoration: none; font-size: 18px; font-weight: 500; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 98; }
    .menu-overlay.active { opacity: 1; pointer-events: auto; }

    .demo-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px;
      border-radius: 12px;
    }
    .demo-nav a { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; transition: all 0.2s ease; }
    .demo-nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .demo-nav a.active { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: #fff; }

    .replay-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

    @media (max-width: 768px) {
      .nav-links, .cta { display: none; }
      .burger { display: flex; }
      .demo { padding: 24px; }
    }
  </style>
</head>
<body>

<button class="replay-btn" onclick="location.reload()">↻ Replay All</button>

<nav class="nav">
  <div class="logo"><span>WiseGenerative</span></div>
  <div class="nav-links">
    <a href="#">Accueil</a>
    <a href="#">Solutions</a>
    <a href="#">Tarifs</a>
  </div>
  <button class="cta">Réserver une Démo</button>
  <button class="burger" id="burger">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="menu-overlay" id="overlay"></div>
<div class="mobile-menu" id="mobileMenu">
  <a href="#">Accueil</a>
  <a href="#">Solutions</a>
  <a href="#">Tarifs</a>
  <a href="#">Contact</a>
</div>

<div class="demo">
  <div class="eyebrow">🌫️ Demo 3 — Fade In Animations</div>
  <h1 class="title">Staggered Content Reveal</h1>

  <div class="animation-grid">
    <div class="anim-card card-1"><span>👋</span>Fade In</div>
    <div class="anim-card card-2"><span>⬆️</span>Slide Up</div>
    <div class="anim-card card-3"><span>⬆️</span>Scale In</div>
    <div class="anim-card card-4"><span>⬅️</span>Slide Left</div>
    <div class="anim-card card-5"><span>➡️</span>Slide Right</div>
    <div class="anim-card card-6"><span>⬇️</span>Slide Down</div>
  </div>
</div>

<div class="demo-nav">
  <a href="01-video-background.html">1</a>
  <a href="02-character-reveal.html">2</a>
  <a href="03-fade-in.html" class="active">3</a>
  <a href="04-liquid-glass.html">4</a>
  <a href="05-gradient-text.html">5</a>
  <a href="06-burger-menu.html">6</a>
</div>

<script>
  const burger = document.getElementById('burger');
  const menu = document.getElementById('mobileMenu');
  const overlay = document.getElementById('overlay');
  burger.addEventListener('click', () => {
    burger.classList.toggle('active');
    menu.classList.toggle('open');
    overlay.classList.toggle('active');
    document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
  });
  overlay.addEventListener('click', () => {
    burger.classList.remove('active');
    menu.classList.remove('open');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  });
</script>

</body>
</html>
