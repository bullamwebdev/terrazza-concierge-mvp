<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 2: Character Reveal + Image</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Instrument Serif', Georgia, serif; color: #fff; }

    .demo { position: relative; width: 100%; height: 100vh; overflow: hidden; }

    /* Animated background */
    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: 0;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .demo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1920&q=80');
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      mix-blend-mode: overlay;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .eyebrow.animate { opacity: 1; transform: translateY(0); }

    .title {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 400;
      line-height: 1.1;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .title .line { display: block; overflow: hidden; }
    .title .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .title .char.visible { opacity: 1; transform: translateY(0); }

    .title .highlight {
      background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
    }

    .subtitle {
      font-family: -apple-system, sans-serif;
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      margin-top: 24px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .subtitle.animate { opacity: 1; transform: translateY(0); }

    .controls {
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 101;
      display: flex;
      gap: 8px;
      flex-direction: column;
    }
    .btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
      transition: all 0.2s ease;
    }
    .btn:hover { background: rgba(255,255,255,0.15); }
    .btn.primary { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); border: none; }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: -apple-system, sans-serif;
    }
    .logo { font-size: 18px; font-weight: 600; }
    .logo span { background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #fff; }
    .cta { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .burger { display: none; }

    .demo-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px;
      border-radius: 12px;
      font-family: -apple-system, sans-serif;
    }
    .demo-nav a { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; transition: all 0.2s ease; }
    .demo-nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .demo-nav a.active { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: #fff; }

    @media (max-width: 768px) {
      .nav-links, .cta { display: none; }
      .burger { display: flex; }
      .content { padding: 24px; }
    }
  </style>
</head>
<body>

<div class="controls">
  <button class="btn primary" onclick="playAnimation()">↻ Replay</button>
  <button class="btn" onclick="changeText()">✏️ Change Text</button>
</div>

<nav class="nav">
  <div class="logo"><span>WiseGenerative</span></div>
  <div class="nav-links">
    <a href="#">Accueil</a>
    <a href="#">Solutions</a>
    <a href="#">Tarifs</a>
  </div>
  <button class="cta">Réserver une Démo</button>
</nav>

<div class="demo">
  <div class="bg"></div>

  <div class="content">
    <div class="eyebrow" id="eyebrow">Demo 2 — Character Reveal + Image</div>

    <h1 class="title" id="heading">
      <span class="line" id="line1"></span>
      <span class="line" id="line2"></span>
    </h1>

    <p class="subtitle" id="subtitle">Each character slides in with staggered timing. Click Replay to see again.</p>
  </div>
</div>

<div class="demo-nav">
  <a href="01-video-background.html">1</a>
  <a href="02-character-reveal.html" class="active">2</a>
  <a href="03-fade-in.html">3</a>
  <a href="04-liquid-glass.html">4</a>
  <a href="05-gradient-text.html">5</a>
  <a href="06-burger-menu.html">6</a>
</div>

<script>
  const texts = [
    ['Bonjour', 'Andrew'],
    ['Welcome to', 'the Future'],
    ['Design', 'Matters'],
    ['Create', 'Beauty']
  ];
  let textIndex = 0;

  function playAnimation() {
    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');
    const eyebrow = document.getElementById('eyebrow');
    const subtitle = document.getElementById('subtitle');
    const t = texts[textIndex];

    // Reset
    eyebrow.classList.remove('animate');
    subtitle.classList.remove('animate');
    line1.innerHTML = '';
    line2.innerHTML = '';

    void document.body.offsetWidth;

    // Build chars
    [...t[0]].forEach((char, i) => {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = char === ' ' ? '\u00A0' : char;
      span.style.transitionDelay = `${i * 40}ms`;
      line1.appendChild(span);
    });

    [...t[1]].forEach((char, i) => {
      const span = document.createElement('span');
      span.className = 'char';
      if (t[1] === 'Andrew') span.classList.add('highlight');
      span.textContent = char === ' ' ? '\u00A0' : char;
      span.style.transitionDelay = `${400 + i * 40}ms`;
      line2.appendChild(span);
    });

    // Animate
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        eyebrow.classList.add('animate');
        line1.querySelectorAll('.char').forEach(c => c.classList.add('visible'));
        line2.querySelectorAll('.char').forEach(c => c.classList.add('visible'));
        setTimeout(() => subtitle.classList.add('animate'), 600);
      });
    });
  }

  function changeText() {
    textIndex = (textIndex + 1) % texts.length;
    playAnimation();
  }

  document.addEventListener('DOMContentLoaded', playAnimation);
</script>

</body>
</html>
