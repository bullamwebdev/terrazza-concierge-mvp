<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 2: Character Reveal</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #0a0a0a; color: #fff; font-family: 'Instrument Serif', Georgia, serif; }

    .demo { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.3s forwards;
    }

    .title {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 400;
      line-height: 1.1;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .title .line { display: block; overflow: hidden; }
    .title .char {
      display: inline-block;
      opacity: 0;
      transform: translateX(-18px);
      animation: charReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .title .highlight {
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease infinite;
    }

    .subtitle {
      font-family: -apple-system, sans-serif;
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      margin-top: 24px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 1.5s forwards;
    }

    /* Controls */
    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      gap: 8px;
    }
    .btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
      transition: all 0.2s ease;
    }
    .btn:hover { background: rgba(255,255,255,0.15); }
    .btn.primary { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); border: none; }

    /* Nav */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.1s forwards;
    }
    .logo { font-size: 18px; font-weight: 600; font-family: -apple-system, sans-serif; }
    .logo span { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 28px; font-family: -apple-system, sans-serif; }
    .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #fff; }
    .cta {
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
    }
    .burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .burger span { display: block; width: 20px; height: 2px; background: #fff; border-radius: 2px; transition: all 0.3s ease; }
    .burger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .burger.active span:nth-child(2) { opacity: 0; }
    .burger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .mobile-menu {
      position: fixed;
      top: 0;
      right: -100%;
      width: 280px;
      height: 100vh;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      padding: 100px 24px 24px;
      transition: right 0.3s ease;
      z-index: 99;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: -apple-system, sans-serif;
    }
    .mobile-menu.open { right: 0; }
    .mobile-menu a { color: #fff; text-decoration: none; font-size: 18px; font-weight: 500; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 98; }
    .menu-overlay.active { opacity: 1; pointer-events: auto; }

    .demo-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px;
      border-radius: 12px;
      font-family: -apple-system, sans-serif;
    }
    .demo-nav a { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; transition: all 0.2s ease; }
    .demo-nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .demo-nav a.active { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: #fff; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes charReveal { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    @media (max-width: 768px) {
      .nav-links, .cta { display: none; }
      .burger { display: flex; }
      .demo { padding: 24px; }
    }
  </style>
</head>
<body>

<div class="controls">
  <button class="btn primary" onclick="replay()">↻ Replay</button>
  <button class="btn" onclick="changeText()">✏️ Change</button>
</div>

<nav class="nav">
  <div class="logo"><span>WiseGenerative</span></div>
  <div class="nav-links">
    <a href="#">Accueil</a>
    <a href="#">Solutions</a>
    <a href="#">Tarifs</a>
  </div>
  <button class="cta">Réserver une Démo</button>
  <button class="burger" id="burger">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="menu-overlay" id="overlay"></div>
<div class="mobile-menu" id="mobileMenu">
  <a href="#">Accueil</a>
  <a href="#">Solutions</a>
  <a href="#">Tarifs</a>
  <a href="#">Contact</a>
</div>

<div class="demo">
  <div class="eyebrow">✨ Demo 2 — Character Reveal</div>

  <h1 class="title" id="heading">
    <span class="line" data-text="Bonjour"></span>
    <span class="line" data-text="Andrew"></span>
  </h1>

  <p class="subtitle">Each character slides in with staggered timing. Expo-out easing for smooth, premium feel.</p>
</div>

<div class="demo-nav">
  <a href="01-video-background.html">1</a>
  <a href="02-character-reveal.html" class="active">2</a>
  <a href="03-fade-in.html">3</a>
  <a href="04-liquid-glass.html">4</a>
  <a href="05-gradient-text.html">5</a>
  <a href="06-burger-menu.html">6</a>
</div>

<script>
  const texts = [
    ['Bonjour', 'Andrew'],
    ['Design', 'Matters'],
    ['Motion', 'Sites'],
    ['Create', 'Beauty']
  ];
  let textIndex = 0;

  function animate() {
    const heading = document.getElementById('heading');
    const lines = heading.querySelectorAll('.line');
    lines.forEach((line, lineIndex) => {
      const text = line.dataset.text;
      line.innerHTML = '';
      [...text].forEach((char, i) => {
        const span = document.createElement('span');
        span.className = 'char';
        if (lineIndex === 1 && text === 'Andrew') span.classList.add('highlight');
        span.textContent = char === ' ' ? '\u00A0' : char;
        span.style.animationDelay = `${lineIndex * 400 + i * 30}ms`;
        line.appendChild(span);
      });
    });
  }

  function replay() {
    const heading = document.getElementById('heading');
    heading.style.opacity = '0';
    setTimeout(() => {
      heading.style.opacity = '1';
      animate();
    }, 100);
  }

  function changeText() {
    textIndex = (textIndex + 1) % texts.length;
    const lines = document.querySelectorAll('.line');
    lines[0].dataset.text = texts[textIndex][0];
    lines[1].dataset.text = texts[textIndex][1];
    replay();
  }

  // Burger menu
  const burger = document.getElementById('burger');
  const menu = document.getElementById('mobileMenu');
  const overlay = document.getElementById('overlay');
  burger.addEventListener('click', () => {
    burger.classList.toggle('active');
    menu.classList.toggle('open');
    overlay.classList.toggle('active');
    document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
  });
  overlay.addEventListener('click', () => {
    burger.classList.remove('active');
    menu.classList.remove('open');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  });

  animate();
</script>

</body>
</html>
