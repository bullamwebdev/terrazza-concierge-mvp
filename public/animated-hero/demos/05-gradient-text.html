<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 5: Gradient Text + Animated BG</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Instrument Serif', Georgia, serif; color: #fff; }

    .demo { position: relative; width: 100%; height: 100vh; overflow: hidden; }

    /* Animated mesh gradient */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(at 20% 30%, hsla(260,100%,60%,0.8) 0px, transparent 50%),
        radial-gradient(at 80% 20%, hsla(180,100%,50%,0.6) 0px, transparent 50%),
        radial-gradient(at 40% 80%, hsla(280,100%,60%,0.7) 0px, transparent 50%),
        radial-gradient(at 80% 80%, hsla(200,100%,50%,0.5) 0px, transparent 50%);
      background-size: 200% 200%;
      animation: meshShift 10s ease infinite;
      z-index: 0;
    }

    @keyframes meshShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .demo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1920&q=80');
      background-size: cover;
      background-position: center;
      opacity: 0.2;
      mix-blend-mode: overlay;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .eyebrow.animate { opacity: 1; transform: translateY(0); }

    .gradient-text {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease-out;
    }
    .gradient-text.animate { opacity: 1; transform: translateY(0); }

    .gradient-static {
      background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .gradient-animated {
      background: linear-gradient(135deg, #a78bfa 0%, #5eead4 50%, #a78bfa 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease infinite;
    }

    .gradient-rainbow {
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff, #5f27cd, #ff6b6b);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbowShift 5s linear infinite;
    }

    .gradient-shimmer {
      background: linear-gradient(120deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0.3) 100%), linear-gradient(135deg, #a78bfa 0%, #5eead4 100%);
      background-size: 200% 100%, 100% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2s ease-in-out infinite;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out 0.3s;
    }
    .controls.animate { opacity: 1; transform: translateY(0); }

    .btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
      transition: all 0.2s ease;
    }
    .btn:hover { background: rgba(255,255,255,0.15); }
    .btn.active { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); border: none; }

    .subtitle {
      font-family: -apple-system, sans-serif;
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out 0.5s;
    }
    .subtitle.animate { opacity: 1; transform: translateY(0); }

    @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @keyframes rainbowShift { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    .replay-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 101;
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
      font-family: -apple-system, sans-serif;
    }
    .replay-btn:hover { transform: scale(1.05); }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: -apple-system, sans-serif;
    }
    .logo { font-size: 18px; font-weight: 600; }
    .logo span { background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #fff; }
    .cta { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .burger { display: none; }

    .demo-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px;
      border-radius: 12px;
      font-family: -apple-system, sans-serif;
    }
    .demo-nav a { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; transition: all 0.2s ease; }
    .demo-nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .demo-nav a.active { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: #fff; }

    @media (max-width: 768px) {
      .nav-links, .cta { display: none; }
      .burger { display: flex; }
      .content { padding: 24px; }
      .replay-btn { top: auto; bottom: 80px; right: 50%; transform: translateX(50%); }
    }
  </style>
</head>
<body>

<button class="replay-btn" id="replayBtn">↻ Replay Animation</button>

<nav class="nav">
  <div class="logo"><span>WiseGenerative</span></div>
  <div class="nav-links">
    <a href="#">Accueil</a>
    <a href="#">Solutions</a>
    <a href="#">Tarifs</a>
  </div>
  <button class="cta">Réserver une Démo</button>
</nav>

<div class="demo">
  <div class="bg"></div>

  <div class="content">
    <div class="eyebrow" id="eyebrow">Demo 5 — Gradient Text + Mesh</div>

    <h1 class="gradient-text gradient-animated" id="text">Bonjour Andrew</h1>

    <div class="controls" id="controls">
      <button class="btn" onclick="setGradient('static', this)">Static</button>
      <button class="btn active" onclick="setGradient('animated', this)">Animated</button>
      <button class="btn" onclick="setGradient('rainbow', this)">Rainbow</button>
      <button class="btn" onclick="setGradient('shimmer', this)">Shimmer</button>
    </div>

    <p class="subtitle" id="subtitle">Click to switch gradient variants. Mesh gradient background animates continuously.</p>
  </div>
</div>

<div class="demo-nav">
  <a href="01-video-background.html">1</a>
  <a href="02-character-reveal.html">2</a>
  <a href="03-fade-in.html">3</a>
  <a href="04-liquid-glass.html">4</a>
  <a href="05-gradient-text.html" class="active">5</a>
  <a href="06-burger-menu.html">6</a>
</div>

<script>
  const text = document.getElementById('text');
  const classes = { static: 'gradient-static', animated: 'gradient-animated', rainbow: 'gradient-rainbow', shimmer: 'gradient-shimmer' };

  function setGradient(type, btn) {
    text.className = 'gradient-text ' + classes[type];
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function playAnimation() {
    ['eyebrow', 'text', 'controls', 'subtitle'].forEach(id => {
      document.getElementById(id).classList.remove('animate');
    });
    void document.body.offsetWidth;

    setTimeout(() => document.getElementById('eyebrow').classList.add('animate'), 100);
    setTimeout(() => document.getElementById('text').classList.add('animate'), 300);
    setTimeout(() => document.getElementById('controls').classList.add('animate'), 500);
    setTimeout(() => document.getElementById('subtitle').classList.add('animate'), 700);
  }

  document.getElementById('replayBtn').addEventListener('click', playAnimation);
  document.addEventListener('DOMContentLoaded', playAnimation);
</script>

</body>
</html>
