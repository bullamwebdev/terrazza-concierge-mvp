<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiseGenerative — L'IA au Service de Votre Conciergerie</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; color: #fff; }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .animated-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(124, 58, 237, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(20, 184, 166, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(167, 139, 250, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(94, 234, 212, 0.15) 0%, transparent 40%);
      background-size: 200% 200%;
      animation: bgShift 12s ease-in-out infinite;
    }

    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%, 100% 0%, 50% 100%, 100% 100%; }
      33% { background-position: 100% 50%, 0% 100%, 100% 0%, 0% 0%; }
      66% { background-position: 50% 100%, 50% 0%, 0% 50%, 50% 50%; }
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.6;
      z-index: 1;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.8) 0%, transparent 70%);
      top: -100px; left: -100px;
      animation: float1 15s ease-in-out infinite;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(20,184,166,0.7) 0%, transparent 70%);
      bottom: -50px; right: -50px;
      animation: float2 18s ease-in-out infinite;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(167,139,250,0.6) 0%, transparent 70%);
      top: 50%; left: 50%;
      animation: float3 20s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(100px, 80px) scale(1.2); }
      50% { transform: translate(50px, 150px) scale(0.9); }
      75% { transform: translate(-50px, 50px) scale(1.1); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-80px, -100px) scale(1.3); }
      66% { transform: translate(-150px, -50px) scale(0.8); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-30%, -70%) scale(1.2); }
    }

    /* Noise texture overlay */
    .noise {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Dark overlay for readability */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
      z-index: 3;
    }

    /* ===== CONTENT ===== */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 900px;
      padding: 0 32px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s ease-out 0.3s;
    }
    .eyebrow.animate { opacity: 1; transform: translateY(0); }

    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s ease-out 0.5s;
    }
    h1.animate { opacity: 1; transform: translateY(0); }

    h1 .accent {
      background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.7;
      max-width: 600px;
      margin: 0 auto 40px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s ease-out 0.7s;
    }
    .tagline.animate { opacity: 1; transform: translateY(0); }

    .cta-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s ease-out 0.9s;
    }
    .cta-group.animate { opacity: 1; transform: translateY(0); }

    .btn {
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: #fff;
      border: none;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3); }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      transition: opacity 0.8s ease-out 1.1s;
    }
    .top-bar.animate { opacity: 1; }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .logo span { background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .nav-link { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s ease; }
    .nav-link:hover { color: #fff; }

    /* Demo nav */
    .demo-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px;
      border-radius: 12px;
    }
    .demo-nav a { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; transition: all 0.2s ease; }
    .demo-nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .demo-nav a.active { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: #fff; }

    @media (max-width: 768px) {
      .top-bar { padding: 20px 24px; }
      .content { padding: 0 24px; }
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="hero">
    <div class="animated-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="noise"></div>

    <header class="top-bar" id="topBar">
      <div class="logo"><span>WiseGenerative</span></div>
      <a href="#" class="nav-link">Explorer</a>
    </header>

    <div class="content">
      <div class="eyebrow" id="eyebrow">Nouvelle ère digitale</div>
      
      <h1 id="headline">
        L'IA au Service de<br>Votre <span class="accent">Conciergerie</span>
      </h1>
      
      <p class="tagline" id="tagline">
        Automatisez vos tâches, personnalisez votre service et offrez une expérience inégalée à vos clients.
      </p>
      
      <div class="cta-group" id="ctaGroup">
        <a href="#" class="btn btn-primary">Réserver une Démo</a>
        <a href="#" class="btn btn-secondary">Voir les Solutions</a>
      </div>
    </div>
  </div>

  <div class="demo-nav">
    <a href="01-video-background.html" class="active">1</a>
    <a href="02-character-reveal.html">2</a>
    <a href="03-fade-in.html">3</a>
    <a href="04-liquid-glass.html">4</a>
    <a href="05-gradient-text.html">5</a>
    <a href="06-burger-menu.html">6</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => document.getElementById('eyebrow').classList.add('animate'), 200);
      setTimeout(() => document.getElementById('headline').classList.add('animate'), 400);
      setTimeout(() => document.getElementById('tagline').classList.add('animate'), 600);
      setTimeout(() => document.getElementById('ctaGroup').classList.add('animate'), 800);
      setTimeout(() => document.getElementById('topBar').classList.add('animate'), 1000);
    });
  </script>

</body>
</html>
