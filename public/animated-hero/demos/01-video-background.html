<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 1: Video Background Crossfade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, sans-serif; color: #fff; }

    .demo { position: relative; width: 100%; height: 100vh; overflow: hidden; }

    /* Video */
    .video-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1s ease-out;
      transform: translateY(15%);
    }
    .video-bg.loaded { opacity: 1; }

    .demo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.6) 100%);
      z-index: 1;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 40px 60px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      margin-bottom: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .eyebrow.animate { opacity: 1; transform: translateY(0); }

    .title {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .title.animate { opacity: 1; transform: translateY(0); }

    .title .highlight {
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
    }

    .subtitle {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      max-width: 480px;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .subtitle.animate { opacity: 1; transform: translateY(0); }

    /* Nav */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }
    .nav.animate { opacity: 1; transform: translateY(0); }

    .logo { font-size: 18px; font-weight: 600; }
    .logo span { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; transition: color 0.2s ease; }
    .nav-links a:hover { color: #fff; }

    .cta {
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .cta:hover { transform: translateY(-2px); }

    .burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .burger span { display: block; width: 20px; height: 2px; background: #fff; border-radius: 2px; transition: all 0.3s ease; }
    .burger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .burger.active span:nth-child(2) { opacity: 0; }
    .burger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .mobile-menu {
      position: fixed;
      top: 0;
      right: -100%;
      width: 280px;
      height: 100vh;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      padding: 100px 24px 24px;
      transition: right 0.3s ease;
      z-index: 99;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mobile-menu.open { right: 0; }
    .mobile-menu a { color: #fff; text-decoration: none; font-size: 18px; font-weight: 500; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 98; }
    .menu-overlay.active { opacity: 1; pointer-events: auto; }

    /* Replay button */
    .replay-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 101;
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
      font-family: -apple-system, sans-serif;
    }
    .replay-btn:hover { transform: scale(1.05); }

    /* Demo nav */
    .demo-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px;
      border-radius: 12px;
    }
    .demo-nav a { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; transition: all 0.2s ease; }
    .demo-nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .demo-nav a.active { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: #fff; }

    @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    @media (max-width: 768px) {
      .nav-links, .cta { display: none; }
      .burger { display: flex; }
      .content { padding: 0 24px 40px; }
      .replay-btn { top: auto; bottom: 80px; right: 50%; transform: translateX(50%); }
    }
  </style>
</head>
<body>

<button class="replay-btn" id="replayBtn">↻ Replay Animation</button>

<div class="demo">
  <video class="video-bg" id="video" autoplay muted loop playsinline>
    <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_115001_bcdaa3b4-03de-47e7-ad63-ae3e392c32d4.mp4" type="video/mp4">
  </video>

  <nav class="nav" id="navbar">
    <div class="logo"><span>WiseGenerative</span></div>
    <div class="nav-links">
      <a href="#">Accueil</a>
      <a href="#">Solutions</a>
      <a href="#">Tarifs</a>
    </div>
    <button class="cta">Réserver une Démo</button>
    <button class="burger" id="burger">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="menu-overlay" id="overlay"></div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="#">Accueil</a>
    <a href="#">Solutions</a>
    <a href="#">Tarifs</a>
    <a href="#">Contact</a>
  </div>

  <div class="content">
    <div class="eyebrow" id="eyebrow">🎬 Demo 1 — Video Background</div>
    <h1 class="title" id="title">
      Seamless <span class="highlight">Video Loop</span>
    </h1>
    <p class="subtitle" id="subtitle">Full-screen video with smooth crossfade transitions at loop points.</p>
  </div>
</div>

<div class="demo-nav">
  <a href="01-video-background.html" class="active">1</a>
  <a href="02-character-reveal.html">2</a>
  <a href="03-fade-in.html">3</a>
  <a href="04-liquid-glass.html">4</a>
  <a href="05-gradient-text.html">5</a>
  <a href="06-burger-menu.html">6</a>
</div>

<script>
  // Video fade-in
  const video = document.getElementById('video');
  video.addEventListener('loadeddata', () => video.classList.add('loaded'));

  // Animation trigger
  function playAnimation() {
    const elements = ['navbar', 'eyebrow', 'title', 'subtitle'];
    elements.forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('animate');
      void el.offsetWidth; // Force reflow
    });

    // Staggered delays
    setTimeout(() => document.getElementById('navbar').classList.add('animate'), 100);
    setTimeout(() => document.getElementById('eyebrow').classList.add('animate'), 300);
    setTimeout(() => document.getElementById('title').classList.add('animate'), 500);
    setTimeout(() => document.getElementById('subtitle').classList.add('animate'), 700);
  }

  // Replay button
  document.getElementById('replayBtn').addEventListener('click', playAnimation);

  // Auto-play on load
  document.addEventListener('DOMContentLoaded', playAnimation);

  // Burger menu
  const burger = document.getElementById('burger');
  const menu = document.getElementById('mobileMenu');
  const overlay = document.getElementById('overlay');
  burger.addEventListener('click', () => {
    burger.classList.toggle('active');
    menu.classList.toggle('open');
    overlay.classList.toggle('active');
    document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
  });
  overlay.addEventListener('click', () => {
    burger.classList.remove('active');
    menu.classList.remove('open');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  });
</script>

</body>
</html>
