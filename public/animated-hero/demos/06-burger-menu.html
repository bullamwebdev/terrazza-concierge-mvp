<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 6: Burger Menu + Parallax</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, sans-serif; color: #fff; }

    .demo { position: relative; width: 100%; height: 100vh; overflow: hidden; }

    /* Animated gradient background */
    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: 0;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .demo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=1920&q=80');
      background-size: cover;
      background-position: center;
      opacity: 0.1;
      mix-blend-mode: overlay;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .eyebrow.animate { opacity: 1; transform: translateY(0); }

    .title { font-size: clamp(2rem, 5vw, 4rem); font-weight: 600; line-height: 1.1; text-align: center; margin-bottom: 16px; opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
    .title.animate { opacity: 1; transform: translateY(0); }

    .subtitle { font-size: 18px; color: rgba(255,255,255,0.6); text-align: center; max-width: 500px; line-height: 1.6; opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
    .subtitle.animate { opacity: 1; transform: translateY(0); }

    .instruction {
      margin-top: 40px;
      padding: 20px 32px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 16px;
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .instruction.animate { opacity: 1; transform: translateY(0); }

    .burger-demo {
      margin-top: 32px;
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .burger-demo.animate { opacity: 1; transform: translateY(0); }

    .burger-demo span {
      display: block;
      width: 28px;
      height: 3px;
      background: #fff;
      border-radius: 3px;
      transition: all 0.3s ease;
    }
    .burger-demo.active span:nth-child(1) { transform: rotate(45deg) translate(7px, 7px); }
    .burger-demo.active span:nth-child(2) { opacity: 0; }
    .burger-demo.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }

    .replay-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 101;
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .replay-btn:hover { transform: scale(1.05); }

    /* Nav */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 18px; font-weight: 600; }
    .logo span { background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #fff; }
    .cta { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .burger { display: none; }

    .demo-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px;
      border-radius: 12px;
    }
    .demo-nav a { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; transition: all 0.2s ease; }
    .demo-nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .demo-nav a.active { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: #fff; }

    @media (max-width: 768px) {
      .nav-links, .cta { display: none; }
      .burger { display: flex; }
      .demo { padding: 24px; }
      .replay-btn { top: auto; bottom: 80px; right: 50%; transform: translateX(50%); }
    }
  </style>
</head>
<body>

<button class="replay-btn" id="replayBtn">↻ Replay Animation</button>

<nav class="nav">
  <div class="logo"><span>WiseGenerative</span></div>
  <div class="nav-links">
    <a href="#">Accueil</a>
    <a href="#">Solutions</a>
    <a href="#">Tarifs</a>
  </div>
  <button class="cta">Réserver une Démo</button>
</nav>

<div class="demo">
  <div class="bg"></div>

  <div class="content">
    <div class="eyebrow" id="eyebrow">Demo 6 — Burger Menu + Parallax</div>
    <h1 class="title" id="title">Mobile Navigation</h1>
    <p class="subtitle" id="subtitle">Slide-in overlay menu with hamburger-to-X animation.</p>

    <div class="instruction" id="instruction">
      📱 Resize browser to <768px or tap the hamburger above
    </div>

    <div class="burger-demo" id="demoBurger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</div>

<div class="demo-nav">
  <a href="01-video-background.html">1</a>
  <a href="02-character-reveal.html">2</a>
  <a href="03-fade-in.html">3</a>
  <a href="04-liquid-glass.html">4</a>
  <a href="05-gradient-text.html">5</a>
  <a href="06-burger-menu.html" class="active">6</a>
</div>

<script>
  function playAnimation() {
    ['eyebrow', 'title', 'subtitle', 'instruction', 'demoBurger'].forEach(id => {
      document.getElementById(id).classList.remove('animate');
    });
    void document.body.offsetWidth;

    setTimeout(() => document.getElementById('eyebrow').classList.add('animate'), 100);
    setTimeout(() => document.getElementById('title').classList.add('animate'), 300);
    setTimeout(() => document.getElementById('subtitle').classList.add('animate'), 500);
    setTimeout(() => document.getElementById('instruction').classList.add('animate'), 700);
    setTimeout(() => document.getElementById('demoBurger').classList.add('animate'), 900);
  }

  document.getElementById('replayBtn').addEventListener('click', playAnimation);
  document.addEventListener('DOMContentLoaded', playAnimation);

  // Demo burger interaction
  const demoBurger = document.getElementById('demoBurger');
  demoBurger.addEventListener('click', () => {
    demoBurger.classList.toggle('active');
  });
</script>

</body>
</html>
