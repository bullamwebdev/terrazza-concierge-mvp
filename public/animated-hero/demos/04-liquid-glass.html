<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 4: Liquid Glass + Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, sans-serif; color: #fff; }

    .demo { position: relative; width: 100%; height: 100vh; overflow: hidden; }

    /* Animated background image */
    .bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1557683316-973673baf926?w=1920&q=80');
      background-size: cover;
      background-position: center;
      animation: bgZoom 20s ease infinite alternate;
      z-index: 0;
    }

    @keyframes bgZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    .demo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .eyebrow.animate { opacity: 1; transform: translateY(0); }

    .title { font-size: clamp(2rem, 5vw, 4rem); font-weight: 600; line-height: 1.1; text-align: center; margin-bottom: 40px; opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
    .title.animate { opacity: 1; transform: translateY(0); }

    .glass-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1000px;
    }

    .glass-card {
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s ease-out;
    }
    .glass-card.animate { opacity: 1; transform: translateY(0); }

    .glass-card:hover {
      transform: translateY(-8px) scale(1.03);
      transition: all 0.3s ease;
    }

    .glass-card span { font-size: 40px; display: block; margin-bottom: 16px; }
    .glass-card p { font-size: 14px; margin-top: 8px; color: rgba(255,255,255,0.7); font-weight: 400; }

    .glass-light {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    }

    .glass-dark {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
    }

    .glass-purple {
      background: rgba(124,58,237,0.15);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(124,58,237,0.3);
      box-shadow: inset 0 1px 1px rgba(124,58,237,0.1);
    }

    .glass-frosted {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 2px 2px rgba(255,255,255,0.1);
    }

    .glass-card:nth-child(1) { transition-delay: 0s; }
    .glass-card:nth-child(2) { transition-delay: 0.15s; }
    .glass-card:nth-child(3) { transition-delay: 0.3s; }
    .glass-card:nth-child(4) { transition-delay: 0.45s; }

    .replay-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 101;
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .replay-btn:hover { transform: scale(1.05); }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 18px; font-weight: 600; }
    .logo span { background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #fff; }
    .cta { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: white; border: none; padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .burger { display: none; }

    .demo-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px;
      border-radius: 12px;
    }
    .demo-nav a { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; transition: all 0.2s ease; }
    .demo-nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .demo-nav a.active { background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%); color: #fff; }

    @media (max-width: 768px) {
      .nav-links, .cta { display: none; }
      .burger { display: flex; }
      .demo { padding: 24px; }
      .replay-btn { top: auto; bottom: 80px; right: 50%; transform: translateX(50%); }
    }
  </style>
</head>
<body>

<button class="replay-btn" id="replayBtn">↻ Replay Animation</button>

<div class="demo">
  <div class="bg"></div>

  <nav class="nav">
    <div class="logo"><span>WiseGenerative</span></div>
    <div class="nav-links">
      <a href="#">Accueil</a>
      <a href="#">Solutions</a>
      <a href="#">Tarifs</a>
    </div>
    <button class="cta">Réserver une Démo</button>
  </nav>

  <div class="content">
    <div class="eyebrow" id="eyebrow">Demo 4 — Liquid Glass + Image</div>
    <h1 class="title" id="title">Frosted Glass Effects</h1>

    <div class="glass-grid" id="grid">
      <div class="glass-card glass-light"><span>🏠</span>Light<br><p>5% white, subtle</p></div>
      <div class="glass-card glass-dark"><span>🎬</span>Dark<br><p>40% black, high blur</p></div>
      <div class="glass-card glass-purple"><span>💜</span>Purple<br><p>Brand tinted glass</p></div>
      <div class="glass-card glass-frosted"><span>❄️</span>Frosted<br><p>Max blur + vibrance</p></div>
    </div>
  </div>
</div>

<div class="demo-nav">
  <a href="01-video-background.html">1</a>
  <a href="02-character-reveal.html">2</a>
  <a href="03-fade-in.html">3</a>
  <a href="04-liquid-glass.html" class="active">4</a>
  <a href="05-gradient-text.html">5</a>
  <a href="06-burger-menu.html">6</a>
</div>

<script>
  function playAnimation() {
    document.getElementById('eyebrow').classList.remove('animate');
    document.getElementById('title').classList.remove('animate');
    document.querySelectorAll('.glass-card').forEach(card => card.classList.remove('animate'));

    void document.body.offsetWidth;

    setTimeout(() => document.getElementById('eyebrow').classList.add('animate'), 100);
    setTimeout(() => document.getElementById('title').classList.add('animate'), 300);
    setTimeout(() => {
      document.querySelectorAll('.glass-card').forEach((card, i) => {
        setTimeout(() => card.classList.add('animate'), i * 150);
      });
    }, 500);
  }

  document.getElementById('replayBtn').addEventListener('click', playAnimation);
  document.addEventListener('DOMContentLoaded', playAnimation);
</script>

</body>
</html>
