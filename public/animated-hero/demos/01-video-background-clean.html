<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiseGenerative — L'IA au Service de Votre Conciergerie</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; color: #fff; }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Video background */
    .video-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s ease-out;
      z-index: 0;
    }
    .video-bg.loaded { opacity: 1; }

    /* Dark overlay for readability */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    /* Content centered */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 900px;
      padding: 0 32px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s ease-out 0.3s;
    }
    .eyebrow.animate { opacity: 1; transform: translateY(0); }

    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s ease-out 0.5s;
    }
    h1.animate { opacity: 1; transform: translateY(0); }

    h1 .accent {
      background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.7;
      max-width: 600px;
      margin: 0 auto 40px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s ease-out 0.7s;
    }
    .tagline.animate { opacity: 1; transform: translateY(0); }

    .cta-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s ease-out 0.9s;
    }
    .cta-group.animate { opacity: 1; transform: translateY(0); }

    .btn {
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
      color: #fff;
      border: none;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3); }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }

    /* Minimal top bar */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      transition: opacity 0.8s ease-out 1.1s;
    }
    .top-bar.animate { opacity: 1; }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .logo span { background: linear-gradient(135deg, #a78bfa 0%, #5eead4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .nav-link {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .nav-link:hover { color: #fff; }

    @media (max-width: 768px) {
      .top-bar { padding: 20px 24px; }
      .content { padding: 0 24px; }
    }
  </style>
</head>
<body>

  <!-- Minimal top bar -->
  <header class="top-bar" id="topBar">
    <div class="logo"><span>WiseGenerative</span></div>
    <a href="#" class="nav-link">Explorer</a>
  </header>

  <!-- Hero with video -->
  <section class="hero">
    <video class="video-bg" id="video" autoplay muted loop playsinline>
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_115001_bcdaa3b4-03de-47e7-ad63-ae3e392c32d4.mp4" type="video/mp4">
    </video>

    <div class="content">
      <div class="eyebrow" id="eyebrow">Nouvelle ère digitale</div>
      
      <h1 id="headline">
        L'IA au Service de<br>Votre <span class="accent">Conciergerie</span>
      </h1>
      
      <p class="tagline" id="tagline">
        Automatisez vos tâches, personnalisez votre service et offrez une expérience inégalée à vos clients.
      </p>
      
      <div class="cta-group" id="ctaGroup">
        <a href="#" class="btn btn-primary">Réserver une Démo</a>
        <a href="#" class="btn btn-secondary">Voir les Solutions</a>
      </div>
    </div>
  </section>

  <script>
    const video = document.getElementById('video');
    video.addEventListener('loadeddata', () => video.classList.add('loaded'));

    // Trigger animations on load
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => document.getElementById('eyebrow').classList.add('animate'), 200);
      setTimeout(() => document.getElementById('headline').classList.add('animate'), 400);
      setTimeout(() => document.getElementById('tagline').classList.add('animate'), 600);
      setTimeout(() => document.getElementById('ctaGroup').classList.add('animate'), 800);
      setTimeout(() => document.getElementById('topBar').classList.add('animate'), 1000);
    });
  </script>

</body>
</html>
